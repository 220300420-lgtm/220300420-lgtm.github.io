<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ADAPTIA Consultoría</title>
  <script>
    /* GitHub Pages Clean URL Redirect
       Encodes the full path into a query string and redirects to the root,
       which handles the navigation via the page subdirectory structure.
       Works for:
         - User/org pages (username.github.io)  → segmentCount = 0
         - Project pages (username.github.io/repo) → segmentCount = 1
       This site uses segmentCount = 0 (user/org page with custom domain).
       Technique: https://github.com/rafgraph/spa-github-pages            */
    (function() {
      var l = window.location;
      var segmentCount = 0; /* 0 for user/org pages (username.github.io) */
      var p = l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~');
      if (p) {
        window.location.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + segmentCount).join('/') +
          '/?/' + p + (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
        );
      }
    })();
  </script>
</head>
<body></body>
</html>
